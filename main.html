<!DOCTYPE html>
<html lang="en">

    <head>    

        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
        <script src="rock-paper-scissors.js"></script>
        <title>Rock, Paper, Scissors, Lizard, Spock!</title>
        <link href="https://fonts.cdnfonts.com/css/twilight-lechy" rel="stylesheet">
        <link href="https://fonts.cdnfonts.com/css/alexandria-4" rel="stylesheet">
                                                        
    </head>

    <body>

    <div id="start-screen">

        <div class="title">
            <img src="/images/Wood-2.png" alt="Wood Picture" class="wood-title">
            <div class="wood-text">
                <p>Rock, Paper, Scissors,</p>
                <p>Lizard, Spock!</p>
            </div>
        </div>
        <div class="start">
            <h1>Ready to play?</h1>
            <button onclick="startGame()">
                <p>Start</p>
            </button>
        </div>

    </div>


    <div id="game-description-screen">

        <div class="game-description">
            <img class="scroll-1" src="/images/Scroll.png" alt="Scroll Picture">
            <p>"<strong>Rock, Paper, Scissors, 
                Lizard, Spock</strong>" is an 
                expansion on the traditional 
                game "Rock, Paper, Scissors."</p>
            <button><a href="#game-rules-screen">Alrighty!</a></button>
        </div> 

    </div>

    </body>

</html>
